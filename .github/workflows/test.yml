# GitHub Actions CI Test Pipeline
# Generated by BMad TEA Agent - CI Architect Module
# Stack: fullstack (TanStack Start + Cloudflare Workers)
# Framework: Playwright (E2E) + Vitest (unit)
# Package manager: Bun
#
# Required GitHub Secrets:
#   DATABASE_URL                  - Neon PostgreSQL connection string
#   VITE_CLERK_PUBLISHABLE_KEY    - Clerk publishable key
#   CLERK_SECRET_KEY              - Clerk secret key
#   CLOUDFLARE_ACCOUNT_ID         - (optional, deploy only)
#   CLOUDFLARE_API_TOKEN          - (optional, deploy only)

name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly burn-in on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting and lint (Biome)
        run: bunx biome check .

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests (Vitest)
        run: bun run test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─── E2E Tests ──────────────────────────────────────────────────────────────
  # Non-blocking: Miniflare + Neon serverless are too flaky to gate merges on.
  # Failures are visible in the Actions UI and artifacts are uploaded, but they
  # will not fail the overall pipeline.
  e2e:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        project: [chromium, firefox, mobile-chrome]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.project }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.project }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        # mobile-chrome uses the Chromium engine (Pixel 5 device preset)
        run: |
          if [ "${{ matrix.project }}" = "mobile-chrome" ]; then
            bunx playwright install --with-deps chromium
          else
            bunx playwright install --with-deps ${{ matrix.project }}
          fi

      - name: Create .dev.vars for Miniflare
        run: |
          cat > .dev.vars << EOF
          DATABASE_URL=$DATABASE_URL
          CLERK_SECRET_KEY=$CLERK_SECRET_KEY
          VITE_CLERK_PUBLISHABLE_KEY=$VITE_CLERK_PUBLISHABLE_KEY
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Warm up Neon DB (prevent cold-start timeouts in first test)
        run: bunx tsx -e "import{neon}from'@neondatabase/serverless';const sql=neon(process.env.DATABASE_URL);await sql\`SELECT 1\`;console.log('DB ready')"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run E2E tests (${{ matrix.project }})
        run: bunx playwright test --project=${{ matrix.project }}
        env:
          CI: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.project }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # ─── Report ──────────────────────────────────────────────────────────────────
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit, e2e]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate job summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e.result }} (non-blocking) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Browser projects:** chromium · firefox · mobile-chrome" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> E2E failures do not block merges — run locally to confirm." >> $GITHUB_STEP_SUMMARY
